spring:
  application:
    name: nexus-hub
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexushub}
    username: ${SPRING_DATASOURCE_USERNAME:nexushub}
    password: ${SPRING_DATASOURCE_PASSWORD:nexushub}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:1}

server:
  port: 8080

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080,http://dsc.rodrigor.com,https://dsc.rodrigor.com,http://eq01.dsc.rodrigor.com,https://eq01.dsc.rodrigor.com}
