<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="nexus-icon nexus-icon-pessoas">
  <!-- Connections between user nodes -->
  <line x1="8" y1="13" x2="16" y2="10" stroke="currentColor" stroke-width="1.2" opacity="0.3"/>
  <line x1="24" y1="13" x2="16" y2="10" stroke="currentColor" stroke-width="1.2" opacity="0.3"/>

  <!-- Center Primary User (Nexus Core) -->
  <circle cx="16" cy="10" r="3.5" fill="#3B6EF4" class="logo-core"/>
  <path d="M9 25 C9 19, 23 19, 23 25" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

  <!-- Left User Node -->
  <circle cx="8" cy="13" r="2.2" fill="currentColor" class="logo-dot"/>
  <path d="M3 26 C3 21.5, 13 21.5, 13 26" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Right User Node -->
  <circle cx="24" cy="13" r="2.2" fill="currentColor" class="logo-dot"/>
  <path d="M19 26 C19 21.5, 29 21.5, 29 26" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
