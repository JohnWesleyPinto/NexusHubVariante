name: Build & Deploy

on:
  workflow_run:
    workflows: ["Qualidade e segurança"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build, push e deploy
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Preparar nome da imagem
        run: |
          echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest" >> "$GITHUB_ENV"

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Baixar imagens-base com retry
        shell: bash
        run: |
          for image in node:20-alpine maven:3.9-eclipse-temurin-21-alpine eclipse-temurin:21-jre-alpine; do
            success=false
            for attempt in 1 2 3 4 5; do
              if docker pull "$image"; then
                success=true
                break
              fi
              echo "Tentativa $attempt falhou para $image; aguardando..."
              sleep $((attempt * 10))
            done
            if [ "$success" != true ]; then
              echo "Não foi possível baixar $image após 5 tentativas."
              exit 1
            fi
          done

      - name: Build e push da imagem
        uses: docker/build-push-action@v7
        with:
          context: ./NEXUSHUB
          file: ./NEXUSHUB/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}

      - name: Configurar acesso SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy no servidor
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USERNAME }}@dsc.rodrigor.com" \
            "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"
